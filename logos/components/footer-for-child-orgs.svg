<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="280"
    viewBox="0 0 1600 280"
    role="img"
    aria-labelledby="title desc">

    <title id="title">The Lupaxa Project Child Organisation Footer</title>
    <desc id="desc">
        Standard footer used across organisations that form part of The Lupaxa Project.
    </desc>

    <!-- Transparent space (20px) above the footer -->

    <!-- Background -->
    <rect
        x="0"
        y="20"
        width="1600"
        height="260"
        fill="#203959" />

    <!-- Border -->
    <rect
        x="1"
        y="21"
        width="1598"
        height="258"
        fill="none"
        stroke="#6D95D3"
        stroke-width="2" />

    <!-- Part of -->
    <text
        x="800"
        y="76"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="18"
        font-weight="500"
        letter-spacing="5"
        fill="#6D95D3">
        PART OF
    </text>

    <!-- Copyright -->
    <text
        x="800"
        y="132"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="34"
        font-weight="600"
        fill="#FFFFFF">
        © The Lupaxa Project.
    </text>

    <!-- Tagline -->
    <text
        x="800"
        y="197"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="22"
        font-weight="400"
        fill="#FFFFFF">
        Where exploration meets precision.
    </text>

    <text
        x="800"
        y="236"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="22"
        font-weight="400"
        fill="#FFFFFF">
        Where the untamed meets the engineered.
    </text>

</svg>
