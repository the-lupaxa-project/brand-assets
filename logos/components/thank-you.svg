<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="220"
    viewBox="0 0 1600 220"
    role="img"
    aria-labelledby="title desc">

    <title id="title">Thank you for supporting</title>
    <desc id="desc">
        Thank you for supporting: The Lupaxa Project
    </desc>

    <!-- Background -->
    <rect
        x="0"
        y="0"
        width="1600"
        height="220"
        fill="#203959" />

    <!-- Border -->
    <rect
        x="1"
        y="1"
        width="1598"
        height="218"
        fill="none"
        stroke="#6D95D3"
        stroke-width="2" />

    <!-- Title -->
    <text
        x="800"
        y="91"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="34"
        font-weight="600"
        fill="#FFFFFF">
        Thank you for supporting
    </text>

    <!-- Subtitle -->
    <text
        x="800"
        y="143"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="22"
        font-weight="400"
        fill="#FFFFFF">
        The Lupaxa Project
    </text>

</svg>
