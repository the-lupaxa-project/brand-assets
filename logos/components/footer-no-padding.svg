<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="220"
    viewBox="0 0 1600 220"
    role="img"
    aria-labelledby="title desc">

    <title id="title">The Lupaxa Project Footer</title>
    <desc id="desc">
        Standard footer used across The Lupaxa Project repositories.
    </desc>

    <!-- Background -->
    <rect
        x="0"
        y="0"
        width="1600"
        height="220"
        fill="#203959" />

    <!-- Border -->
    <rect
        x="1"
        y="1"
        width="1598"
        height="218"
        fill="none"
        stroke="#6D95D3"
        stroke-width="2" />

    <!-- Copyright -->
    <text
        x="800"
        y="72"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="34"
        font-weight="600"
        fill="#FFFFFF">
        © The Lupaxa Project.
    </text>

    <!-- Tagline -->
    <text
        x="800"
        y="137"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="22"
        font-weight="400"
        fill="#FFFFFF">
        Where exploration meets precision.
    </text>

    <text
        x="800"
        y="176"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="22"
        font-weight="400"
        fill="#FFFFFF">
        Where the untamed meets the engineered.
    </text>

</svg>
