<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="120"
    viewBox="0 0 1600 120"
    role="img"
    aria-labelledby="title desc">

    <title id="title">Part of The Lupaxa Project</title>
    <desc id="desc">
        Banner indicating this organisation is part of The Lupaxa Project.
    </desc>

    <!-- Background -->
    <rect
        x="0"
        y="0"
        width="1600"
        height="120"
        fill="#203959" />

    <!-- Border -->
    <rect
        x="1"
        y="1"
        width="1598"
        height="118"
        fill="none"
        stroke="#6D95D3"
        stroke-width="2" />

    <!-- Subtitle -->
    <text
        x="800"
        y="44"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="18"
        font-weight="500"
        letter-spacing="5"
        fill="#6D95D3">
        PART OF
    </text>

    <!-- Title -->
    <text
        x="800"
        y="82"
        text-anchor="middle"
        font-family="ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="32"
        font-weight="600"
        fill="#FFFFFF">
        The Lupaxa Project
    </text>

</svg>
